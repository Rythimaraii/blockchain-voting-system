<!DOCTYPE html>
<html>
<head>
    <title>Vote Page 🎉</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            color: #fff;
        }
        .card {
            background: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            width: 500px;
            text-align: center;
        }
        .btn-vote {
            border-radius: 20px;
            width: 100%;
            font-weight: bold;
            margin: 15px 0;
            padding: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-vote:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .btn-vote img {
            width: 50px;
            margin-right: 15px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 {
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 3px 3px 6px #000;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 Cast Your Vote! 🎉</h1>

        <button class="btn btn-success btn-vote" onclick="vote('BJP','sound1')">
            <img src="/static/party1.jpg"> BJP
        </button>

        <button class="btn btn-primary btn-vote" onclick="vote('Congress','sound2')">
            <img src="/static/party2.png"> Congress
        </button>

        <button class="btn btn-warning btn-vote" onclick="vote('Gen-Z','sound3')">
            <img src="/static/party4.png"> Gen-Z
        </button>

        <button class="btn btn-danger btn-vote" onclick="vote('Samajvaadi','sound4')">
            <img src="/static/party3.png"> Samajvaadi
        </button>

        <!-- Audio files -->
        <audio id="sound1" src="/static/fahhh.mp3"></audio>
        <audio id="sound2" src="/static/boom.mp3"></audio>
        <audio id="sound3" src="/static/wow.mp3"></audio>
        <audio id="sound4" src="/static/yeet.mp3"></audio>
    </div>

<script>
function vote(party, soundId){
    // Play the sound immediately
    var audio = document.getElementById(soundId);
    audio.currentTime = 0;
    audio.play();

    // Send vote in the background via fetch
    fetch('/vote', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: `party=${party}`
    })
    .then(response => response.text())
    .then(data => {
        // Show confirmation without reloading
        alert(data);
    })
    .catch(err => console.error(err));
}
</script>
</body>
</html>
